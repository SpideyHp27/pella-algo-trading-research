<svg viewBox="0 0 1120 190" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" role="img" aria-labelledby="t d">
  <title id="t">SPEC, CODEGEN, AUDIT governance contract</title>
  <desc id="d">AI code changes flow through SPEC then CODEGEN then a read-only AUDIT gate; failures halt and loop back to SPEC, passes merge.</desc>
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0b1220"/><stop offset="1" stop-color="#0d1526"/></linearGradient>
    <linearGradient id="acc5" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#38bdf8"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient>
    <filter id="sh5" x="-30%" y="-40%" width="160%" height="200%"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/></filter>
  </defs>
  <rect width="1120" height="190" rx="16" fill="url(#bg5)"/>
  <rect x="0.5" y="0.5" width="1119" height="189" rx="16" fill="none" stroke="#1e293b"/>

  <!-- row of pills, y=64..104 -->
  <g font-size="13.5" font-weight="700" text-anchor="middle">
    <g filter="url(#sh5)"><rect x="48" y="64" width="150" height="42" rx="10" fill="#111c30" stroke="#243049"/></g>
    <text x="123" y="90" fill="#cdd8e8">Intent</text>

    <g filter="url(#sh5)"><rect x="266" y="64" width="170" height="42" rx="10" fill="#111c30" stroke="#243049"/></g>
    <text x="351" y="84" fill="#e6edf6">SPEC</text><text x="351" y="100" fill="#7587a3" font-size="10.5" font-weight="500">baseline + acceptance</text>

    <g filter="url(#sh5)"><rect x="504" y="64" width="170" height="42" rx="10" fill="#111c30" stroke="#2a2e52"/></g>
    <text x="589" y="84" fill="#e6edf6">CODEGEN</text><text x="589" y="100" fill="#7587a3" font-size="10.5" font-weight="500">implements only the SPEC</text>

    <g filter="url(#sh5)"><rect x="742" y="62" width="170" height="46" rx="10" fill="#0e1730" stroke="#8b5cf6"/></g>
    <text x="827" y="82" fill="#c4b5fd">AUDIT</text><text x="827" y="98" fill="#8a7cb8" font-size="10.5" font-weight="500">read-only · PASS / FAIL</text>

    <g filter="url(#sh5)"><rect x="980" y="64" width="92" height="42" rx="10" fill="#111c30" stroke="#38335f"/></g>
    <text x="1026" y="90" fill="#c4b5fd">Merge</text>
  </g>

  <!-- forward connectors -->
  <g stroke="url(#acc5)" stroke-width="2.5" fill="none">
    <line x1="198" y1="85" x2="262" y2="85"/><line x1="436" y1="85" x2="500" y2="85"/>
    <line x1="674" y1="85" x2="738" y2="85"/><line x1="912" y1="85" x2="976" y2="85"/>
  </g>
  <g fill="#8b5cf6"><path d="M262 85 l-9 -5 v10 z"/><path d="M500 85 l-9 -5 v10 z"/><path d="M738 85 l-9 -5 v10 z"/><path d="M976 85 l-9 -5 v10 z"/></g>

  <!-- fail loop: AUDIT down, back to SPEC -->
  <path d="M827 108 V 150 H 351 V 108" stroke="#3a4760" stroke-width="1.5" stroke-dasharray="3 4" fill="none"/>
  <path d="M351 110 l-5 9 h10 z" fill="#3a4760"/>
  <text x="589" y="166" text-anchor="middle" fill="#6b7a96" font-size="11">FAIL → halt + report → loop</text>
</svg>

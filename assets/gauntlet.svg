<svg viewBox="0 0 1120 470" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" role="img" aria-labelledby="t d">
  <title id="t">The validation gauntlet</title>
  <desc id="d">A statistical screen: ideas pass core gates, out-of-sample, deflated Sharpe and beta-strip; failures are logged and rejected.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0b1220"/><stop offset="1" stop-color="#0d1526"/></linearGradient>
    <linearGradient id="acc2" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#38bdf8"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient>
    <filter id="sh2" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.45"/></filter>
  </defs>
  <rect width="1120" height="470" rx="18" fill="url(#bg2)"/>
  <rect x="0.5" y="0.5" width="1119" height="469" rx="18" fill="none" stroke="#1e293b"/>

  <text x="44" y="52" fill="#f1f5f9" font-size="20" font-weight="700">The Validation Gauntlet</text>
  <text x="44" y="74" fill="#5d6b86" font-size="12.5">Every promising backtest is guilty until proven innocent. Integrity = what it throws away.</text>

  <!-- spine nodes (accent), left column x=70..330 ; 5 stages vertical -->
  <!-- y centers: 120,180,240,300,360 -->
  <g font-size="13.5" font-weight="600">
    <g filter="url(#sh2)"><rect x="70" y="100" width="300" height="40" rx="9" fill="#111c30" stroke="#243049"/></g>
    <text x="90" y="125" fill="#e6edf6">Backtest - honest exits, real costs</text>

    <g filter="url(#sh2)"><rect x="70" y="160" width="300" height="40" rx="9" fill="#111c30" stroke="#243049"/></g>
    <text x="90" y="185" fill="#e6edf6">Core gates - PF / Sharpe / DD / N</text>

    <g filter="url(#sh2)"><rect x="70" y="220" width="300" height="40" rx="9" fill="#111c30" stroke="#2a2e52"/></g>
    <text x="90" y="245" fill="#e6edf6">Out-of-sample - holds vs in-sample?</text>

    <g filter="url(#sh2)"><rect x="70" y="280" width="300" height="40" rx="9" fill="#111c30" stroke="#2f2c57"/></g>
    <text x="90" y="305" fill="#e6edf6">Deflated Sharpe - search-penalized</text>

    <g filter="url(#sh2)"><rect x="70" y="340" width="300" height="40" rx="9" fill="#111c30" stroke="#37325d"/></g>
    <text x="90" y="365" fill="#e6edf6">Beta strip - alpha, not market drift</text>
  </g>

  <!-- accent spine connectors -->
  <g stroke="url(#acc2)" stroke-width="2.5">
    <line x1="220" y1="140" x2="220" y2="160"/><line x1="220" y1="200" x2="220" y2="220"/>
    <line x1="220" y1="260" x2="220" y2="280"/><line x1="220" y1="320" x2="220" y2="340"/>
  </g>

  <!-- rejected branches (muted, dashed) to the right -->
  <g font-size="12">
    <line x1="370" y1="120" x2="470" y2="120" stroke="#3a4760" stroke-width="1.5" stroke-dasharray="3 4"/>
    <rect x="470" y="104" width="180" height="32" rx="8" fill="#0e1626" stroke="#33405a"/>
    <text x="486" y="124" fill="#6b7a96">logged dead-end</text>

    <line x1="370" y1="240" x2="470" y2="240" stroke="#3a4760" stroke-width="1.5" stroke-dasharray="3 4"/>
    <rect x="470" y="224" width="180" height="32" rx="8" fill="#0e1626" stroke="#33405a"/>
    <text x="486" y="244" fill="#6b7a96">overfit - rejected</text>

    <line x1="370" y1="300" x2="470" y2="300" stroke="#3a4760" stroke-width="1.5" stroke-dasharray="3 4"/>
    <rect x="470" y="284" width="180" height="32" rx="8" fill="#0e1626" stroke="#33405a"/>
    <text x="486" y="304" fill="#6b7a96">multiple-testing mirage</text>

    <line x1="370" y1="360" x2="470" y2="360" stroke="#3a4760" stroke-width="1.5" stroke-dasharray="3 4"/>
    <rect x="470" y="344" width="180" height="32" rx="8" fill="#0e1626" stroke="#33405a"/>
    <text x="486" y="364" fill="#6b7a96">all beta - not alpha</text>
  </g>

  <!-- survivor node (highlighted) -->
  <line x1="220" y1="380" x2="220" y2="412" stroke="url(#acc2)" stroke-width="2.5"/>
  <path d="M220 414 l-6 -10 h12 z" fill="#8b5cf6"/>
  <g filter="url(#sh2)"><rect x="760" y="150" width="300" height="170" rx="14" fill="#0e1730" stroke="#8b5cf6"/></g>
  <rect x="760" y="150" width="300" height="4" rx="2" fill="url(#acc2)"/>
  <text x="784" y="190" fill="#c4b5fd" font-size="15" font-weight="700">FALSE POSITIVES CAUGHT</text>
  <text x="784" y="212" fill="#93a4bf" font-size="13">crude metric vs rigorous screen</text>
  <text x="784" y="250" fill="#e6edf6" font-size="32" font-weight="800">150 -> 0</text>
  <text x="784" y="276" fill="#8593ab" font-size="12.5">"winners" on profit factor that</text>
  <text x="784" y="294" fill="#8593ab" font-size="12.5">survived deflated-Sharpe + OOS</text>
</svg>

<svg viewBox="0 0 1120 430" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" role="img" aria-labelledby="t d">
  <title id="t">Featured result: in-play opening-range-breakout edge</title>
  <desc id="d">Out-of-sample Sharpe rises monotonically as the relative-volume in-play filter tightens, crossing the deployable gate at relvol three and above.</desc>
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0b1220"/><stop offset="1" stop-color="#0d1526"/></linearGradient>
    <linearGradient id="bar" x1="0" y1="1" x2="0" y2="0"><stop offset="0" stop-color="#38bdf8"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient>
  </defs>
  <rect width="1120" height="430" rx="18" fill="url(#bg3)"/>
  <rect x="0.5" y="0.5" width="1119" height="429" rx="18" fill="none" stroke="#1e293b"/>

  <text x="44" y="50" fill="#f1f5f9" font-size="20" font-weight="700">Featured Result — Intraday ORB on Stocks-in-Play</text>
  <text x="44" y="72" fill="#5d6b86" font-size="12.5">Out-of-sample Sharpe (proxy) vs relative-volume filter · 6yr 5-min equities · long-only · net of cost</text>

  <!-- y gridlines + labels (0,1,2,3) baseline y=360, 79.4px/unit -->
  <g stroke="#1c2740" stroke-width="1">
    <line x1="140" y1="360" x2="1060" y2="360"/>
    <line x1="140" y1="281" x2="1060" y2="281"/>
    <line x1="140" y1="201" x2="1060" y2="201"/>
    <line x1="140" y1="122" x2="1060" y2="122"/>
  </g>
  <g fill="#5d6b86" font-size="11" text-anchor="end">
    <text x="128" y="364">0</text><text x="128" y="285">1</text><text x="128" y="205">2</text><text x="128" y="126">3</text>
  </g>

  <!-- deployable gate line at Sharpe 1.0 -->
  <line x1="140" y1="281" x2="1060" y2="281" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="5 4" opacity="0.8"/>
  <text x="1056" y="275" text-anchor="end" fill="#a78bfa" font-size="11">deployable gate ≈ 1.0</text>

  <!-- bars: centers 200,340,480,620,760,900 width 80 -->
  <!-- below-gate = muted; above-gate = accent gradient -->
  <g>
    <rect x="160" y="314" width="80" height="46" rx="4" fill="#2a3854"/>
    <rect x="300" y="312" width="80" height="48" rx="4" fill="#2a3854"/>
    <rect x="440" y="202" width="80" height="158" rx="4" fill="url(#bar)"/>
    <rect x="580" y="158" width="80" height="202" rx="4" fill="url(#bar)"/>
    <rect x="720" y="188" width="80" height="172" rx="4" fill="url(#bar)"/>
    <rect x="860" y="101" width="80" height="259" rx="4" fill="url(#bar)"/>
  </g>
  <!-- value labels -->
  <g fill="#cdd8e8" font-size="13" font-weight="700" text-anchor="middle">
    <text x="200" y="305">0.58</text><text x="340" y="303">0.61</text>
    <text x="480" y="193">1.99</text><text x="620" y="149">2.55</text>
    <text x="760" y="179">2.17</text><text x="900" y="92">3.26</text>
  </g>
  <!-- x labels -->
  <g fill="#93a4bf" font-size="12.5" text-anchor="middle">
    <text x="200" y="384">relvol ≥1</text><text x="340" y="384">≥2</text><text x="480" y="384">≥3</text>
    <text x="620" y="384">≥4</text><text x="760" y="384">≥5</text><text x="900" y="384">≥7</text>
  </g>
  <text x="600" y="408" text-anchor="middle" fill="#5d6b86" font-size="11.5">Monotonic rise as the in-play filter tightens — the signature of a real effect, not a lucky parameter. OOS held stronger than IS. Validated lead, not deployed.</text>
</svg>
